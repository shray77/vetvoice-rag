name: veteco
description: "VetEco — ветеринарная экосистема: диктовка → медкарта, калькулятор дозировок, AI-RAG, VLM диагностика"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Speech
  speech_to_text: ^7.0.3
  flutter_tts: ^4.0.2

  # HTTP
  http: ^1.2.1

  # WebView (VetLearn)
  webview_flutter: ^4.8.0

  # Image picker (VLM)
  image_picker: ^1.1.1

  # Path provider
  path_provider: ^2.1.3

  # Shared preferences
  shared_preferences: ^2.2.3

  # URL launcher
  url_launcher: ^6.3.0

  # Intl
  intl: ^0.19.0

  # Markdown rendering
  flutter_markdown: ^0.7.3+1

  # UUID
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/advanced/
