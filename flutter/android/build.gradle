buildscript {
    ext.kotlin_version = '2.0.21'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.4'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Provide flutter.compileSdkVersion for subprojects that reference it
// (speech_to_text uses flutter.compileSdkVersion in its build.gradle)
// This is normally provided by dev.flutter.flutter-gradle-plugin,
// but we use apply from: flutter.gradle which doesn't expose it.
project.ext.flutter = [
    compileSdkVersion: 35,
    minSdkVersion: 21,
    targetSdkVersion: 35,
]

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
