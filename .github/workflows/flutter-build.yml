name: Flutter Build APK

on:
  push:
    branches: [main]
    paths: ['flutter/**', '.github/workflows/flutter-build.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for creating releases

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter/.dart_tool
            flutter/.flutter-plugins
            flutter/.flutter-plugins-dependencies
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('flutter/pubspec.lock') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Cache Gradle wrapper & build
        uses: actions/cache@v4
        with:
          path: |
            flutter/android/.gradle
            flutter/android/build
            flutter/build
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('flutter/android/**/*.gradle', 'flutter/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Create local.properties
        working-directory: flutter
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Analyze
        working-directory: flutter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        working-directory: flutter
        run: flutter build apk --release --shrink

      - name: Rename APK
        run: |
          mv flutter/build/app/outputs/flutter-apk/app-release.apk \
             flutter/build/app/outputs/flutter-apk/veteco-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: veteco-release-apk
          path: flutter/build/app/outputs/flutter-apk/veteco-release.apk
          retention-days: 30

      - name: Get version
        id: version
        working-directory: flutter
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          BUILD=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}+${BUILD}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VetEco ${{ steps.version.outputs.version }}
          body: |
            ## VetEco v${{ steps.version.outputs.version }}

            ### Скачать APK
            👇 Скачайте `veteco-release.apk` ниже и установите на Android устройство.

            ### Модули
            - 📝 Записи — голосовая диктовка → SOAP медкарта
            - 💊 Дозы — калькулятор дозировок (2401 препарат)
            - 🤖 AI — RAG чат + VLM диагностика
            - ⚙️ Ещё — VetLearn + Настройки

            ### Технологии
            - GLM-4-Flash (бесплатно) + RAG (1409 чанков)
            - GLM-4V Flash для VLM диагностики
            - Flutter + Material 3
          files: |
            flutter/build/app/outputs/flutter-apk/veteco-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
