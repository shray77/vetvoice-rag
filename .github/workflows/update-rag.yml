name: Update RAG Knowledge Base

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 02:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build RAG index
        run: python scripts/build_rag.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Validate index
        run: python -c "import faiss; idx=faiss.read_index('knowledge_base/vet_derm_faiss.index'); print(f'Index: {idx.ntotal} vectors')"

      - name: Upload to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          for f in os.listdir("knowledge_base"):
              if f.endswith(('.index', '.pkl', '.json')):
                  api.upload_file(
                      path_or_fileobj=f"knowledge_base/{f}",
                      path_in_repo=f,
                      repo_id="shrayyyy/vet-derm-rag",
                      repo_type="model",
                      token=os.environ["HF_TOKEN"]
                  )
        shell: python
