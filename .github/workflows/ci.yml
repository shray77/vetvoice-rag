name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Cache pip linters
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            lint-${{ runner.os }}-pip-
      - name: Install linters
        run: pip install ruff flake8
      - name: Lint Python
        run: |
          ruff check src/ --ignore E501
          flake8 src/ --max-line-length 120 --exclude __pycache__ --extend-ignore E501

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Cache pip deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            test-${{ runner.os }}-pip-
      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-fail-under=10
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GLM_API_KEY: test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: |
            docker-${{ runner.os }}-buildx-
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: vetvoice-rag:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      - name: Test container starts
        run: docker run -d --name test vetvoice-rag:latest && sleep 5 && docker logs test && docker stop test
