version: "3.9"

services:
  vetvoice-api:
    build: .
    container_name: vetvoice-api
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      - rag-cache:/tmp/vet_rag
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rag-cache:
